name: Python Wrapper

on:
  pull_request:
    paths:
      - "wrappers/python/**"
      - ".github/workflows/python-package.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Show Rust toolchain
        run: rustup show

      - name: Build local skyffla binary for smoke tests
        run: cargo build -p skyffla --locked

      - name: Sync Python wrapper environment
        run: uv sync --project wrappers/python --locked

      - name: Run Python wrapper tests
        env:
          SKYFFLA_BIN: target/debug/skyffla
        run: uv run --project wrappers/python pytest wrappers/python/tests -q

      - name: Verify tag matches Python package version
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: wrappers/python
        run: |
          package_version="$(python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${package_version}" != "${tag_version}" ]; then
            echo "pyproject version ${package_version} does not match tag ${tag_version}" >&2
            exit 1
          fi

      - name: Build Python distributions
        working-directory: wrappers/python
        run: uv build --out-dir ../../dist/python

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/python/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_PYTHON_PACKAGE == '1'
    needs: test-and-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python

  publish-disabled:
    if: startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_PYTHON_PACKAGE != '1'
    needs: test-and-build
    runs-on: ubuntu-24.04
    steps:
      - name: Explain why PyPI publish is skipped
        run: |
          echo "Skipping PyPI publish because repo variable PUBLISH_PYTHON_PACKAGE is not set to 1."
          echo "Enable it after the skyffla package name is claimed and trusted publishing is configured."
