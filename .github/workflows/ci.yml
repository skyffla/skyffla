name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect Rust and CLI changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - "Cargo.toml"
              - "Cargo.lock"
              - "rust-toolchain.toml"
              - "crates/**"
              - ".github/workflows/ci.yml"

  quality:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Rust toolchain
        run: rustup show

      - name: Add lint components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -A clippy::never_loop -A clippy::too_many_arguments

      - name: Run tests
        run: cargo test --workspace --locked

  smoke-build:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-x86_64
          - runner: macos-15
            label: macos-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Rust toolchain
        run: rustup show

      - name: Build release binaries
        run: cargo build --release --bins --locked

  skipped:
    needs: changes
    if: needs.changes.outputs.rust != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Skip Rust CI for frontend-only changes
        run: echo "No Rust or CLI changes detected; skipping cargo checks and binary builds."
