name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "frontend/**"
      - "**/*.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "frontend/**"
      - "**/*.md"
      - "LICENSE"

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Add lint components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -A clippy::never_loop -A clippy::too_many_arguments

      - name: Run tests
        run: cargo test --workspace --locked

  smoke-build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-x86_64
          - runner: macos-15
            label: macos-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Build release binaries
        run: cargo build --release --bins --locked
