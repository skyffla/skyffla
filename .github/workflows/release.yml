name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPO: homebrew-skyffla

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches workspace version
        id: version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          workspace_version="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["workspace"]["package"]["version"])
          PY
          )"

          if [[ "${tag_version}" != "${workspace_version}" ]]; then
            echo "tag version ${tag_version} does not match workspace version ${workspace_version}" >&2
            exit 1
          fi

          echo "version=${tag_version}" >> "${GITHUB_OUTPUT}"

  build:
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Build release binaries
        run: cargo build --release --bins --locked

      - name: Package release archive
        run: |
          chmod +x scripts/release/package-release.sh
          scripts/release/package-release.sh \
            "${{ needs.validate.outputs.version }}" \
            "${{ matrix.target }}" \
            target/release \
            dist

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        run: find dist -type f -name '*.tar.gz' -exec mv {} dist/ \;

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag dist/*.tar.gz dist/SHA256SUMS
          fi

  update-homebrew-tap:
    needs:
      - validate
      - publish
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        run: find dist -type f -name '*.tar.gz' -exec mv {} dist/ \;

      - name: Compute platform checksums
        id: checksums
        working-directory: dist
        run: |
          echo "darwin_arm64=$(sha256sum skyffla-v${{ needs.validate.outputs.version }}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "${GITHUB_OUTPUT}"
          echo "darwin_x86_64=$(sha256sum skyffla-v${{ needs.validate.outputs.version }}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "${GITHUB_OUTPUT}"
          echo "linux_x86_64=$(sha256sum skyffla-v${{ needs.validate.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "${GITHUB_OUTPUT}"
          echo "linux_arm64=$(sha256sum skyffla-v${{ needs.validate.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "${GITHUB_OUTPUT}"

      - name: Check out Homebrew tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ env.HOMEBREW_TAP_REPO }}
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - name: Render formula
        working-directory: homebrew-tap
        run: |
          mkdir -p Formula
          chmod +x ../scripts/release/render-homebrew-formula.sh
          ../scripts/release/render-homebrew-formula.sh \
            "Skyffla" \
            "skyffla" \
            "Terminal-native peer communication tool" \
            "${{ needs.validate.outputs.version }}" \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "${{ steps.checksums.outputs.darwin_arm64 }}" \
            "${{ steps.checksums.outputs.darwin_x86_64 }}" \
            "${{ steps.checksums.outputs.linux_x86_64 }}" \
            "${{ steps.checksums.outputs.linux_arm64 }}" \
            > "Formula/skyffla.rb"
          ../scripts/release/render-homebrew-formula.sh \
            "SkyfflaRendezvous" \
            "skyffla-rendezvous" \
            "Skyffla rendezvous server" \
            "${{ needs.validate.outputs.version }}" \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "${{ steps.checksums.outputs.darwin_arm64 }}" \
            "${{ steps.checksums.outputs.darwin_x86_64 }}" \
            "${{ steps.checksums.outputs.linux_x86_64 }}" \
            "${{ steps.checksums.outputs.linux_arm64 }}" \
            > "Formula/skyffla-rendezvous.rb"

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/skyffla.rb" "Formula/skyffla-rendezvous.rb"

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Update Skyffla formulae to v${{ needs.validate.outputs.version }}"
          git push
